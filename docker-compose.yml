services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      MODELS_DIR: /models
      UPLOADS_DIR: /uploads
      REPORTS_DIR: /reports
      CAPTURES_DIR: /captures
      DEFAULT_MODEL_ID: ${DEFAULT_MODEL_ID}
      AGENT_OFFLINE_AFTER_SECONDS: ${AGENT_OFFLINE_AFTER_SECONDS}
    volumes:
      - ./artifacts:/models:ro
      - uploads_volume:/uploads
      - reports_volume:/reports
      - captures_volume:/captures
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             python -m app.cli init-admin &&
             python -m app.cli load-models /models &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
  uploads_volume:
  reports_volume:
  captures_volume:
